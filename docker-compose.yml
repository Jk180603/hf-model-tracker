services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - api